<!-- @dsCard group="Console" viewport="1320x860" name="Console — product app" subtitle="Dashboard with agents-view / teams-view toggle, agents gallery, teams, run activity" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Ensemble Console</title>
<link rel="stylesheet" href="../../styles.css"/>
<style>
  *{ box-sizing:border-box; }
  html,body{ margin:0; height:100%; overflow: hidden; }
  body{ font-family:var(--font-sans); color:var(--text-primary); background:var(--bg-app); -webkit-font-smoothing:antialiased; }
  #root{ height:100vh; overflow: hidden; }
  .luc, .lucide{ display:inline-flex; }

  /* App shell - no outer scroll */
  .capp{ display:flex; height:100vh; overflow:hidden; }
  .cmain{ flex:1; display:flex; flex-direction:column; min-width:0; min-height:0; overflow: hidden; }

  /* Sidebar */
  .csidebar{
    width:264px; flex:none; background:var(--surface); border-right:1px solid var(--border);
    display:flex; flex-direction:column; overflow: hidden;
    box-shadow: 4px 0 24px -12px rgba(13,16,20,0.08);
  }
  .cworkspace{
    display:flex; align-items:center; gap:10px; margin:10px 12px; padding:10px 12px;
    border:1.5px solid var(--border); border-radius:var(--radius-lg); cursor:pointer;
    transition: all 0.2s var(--ease-out); font-weight:500;
  }
  .cworkspace:hover{
    background:var(--surface-hover);
    border-color:var(--border-strong);
    box-shadow: var(--shadow-sm);
    transform: translateY(-1px);
  }
  .cworkspace:active { transform: translateY(0); }
  .cnavlist{ display:flex; flex-direction:column; gap:2px; padding:8px 12px; overflow-y: auto; flex: 1; }
  .cnav{
    display:flex; align-items:center; gap:12px; width:100%; padding:10px 12px; border:0;
    background:transparent; border-radius:var(--radius-lg);
    font-family:var(--font-sans); font-size:13.5px; font-weight:500; color:var(--text-secondary);
    cursor:pointer; text-align:left;
    transition: all 0.2s var(--ease-out);
  }
  .cnav svg{ width:18px; height:18px; opacity:.85; transition: all 0.2s ease; }
  .cnav:hover{
    background:var(--surface-hover);
    color:var(--text-primary);
    transform: translateX(4px);
  }
  .cnav:hover svg { opacity: 1; transform: scale(1.1); }
  .cnavdiv{ height:1px; background:var(--border); margin:8px 4px; }
  .cupgrade{
    margin:auto 14px 12px; padding:16px;
    background: linear-gradient(145deg, var(--gray-50) 0%, var(--cream-100) 100%);
    border:1.5px solid var(--border); border-radius:var(--radius-xl);
    transition: all 0.25s var(--ease-out);
  }
  .cupgrade:hover {
    border-color: var(--brand-border);
    box-shadow: var(--shadow-md);
    transform: translateY(-2px);
  }
  .cuser{ display:flex; align-items:center; gap:12px; padding:14px 16px; border-top:1px solid var(--border); }

  /* Topbar */
  .ctopbar{
    height:68px; flex:none; display:flex; align-items:center; padding:0 28px;
    border-bottom:1.5px solid var(--border);
    background: linear-gradient(180deg, color-mix(in srgb, var(--surface) 95%, transparent) 0%, color-mix(in srgb, var(--surface) 82%, transparent) 100%);
    backdrop-filter:blur(12px); position:relative; z-index:10;
    box-shadow: 0 1px 3px rgba(13,16,20,0.04);
  }
  .ctopbar svg{ width:18px; height:18px; }

  /* Main scroll area - single scrollbar */
  .cscroll{
    flex:1; overflow-y:auto; overflow-x: hidden;
    scrollbar-width: thin;
    scrollbar-color: var(--gray-300) transparent;
  }
  .cscroll::-webkit-scrollbar {
    width: 8px;
  }
  .cscroll::-webkit-scrollbar-track {
    background: transparent;
  }
  .cscroll::-webkit-scrollbar-thumb {
    background: var(--gray-300);
    border-radius: 99px;
    border: 2px solid transparent;
    background-clip: padding-box;
  }
  .cscroll::-webkit-scrollbar-thumb:hover {
    background: var(--gray-400);
  }

  /* Views */
  .cview{
    padding:32px 36px 48px; display:flex; flex-direction:column; gap:28px; max-width:1200px;
    animation: fadeInUp 0.4s var(--ease-out);
  }
  @keyframes fadeInUp {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .cgreet{ display:flex; align-items:flex-start; justify-content:space-between; gap:16px; }
  .cgreet-title {
    font-family: var(--font-display);
    font-size: 28px;
    font-weight: 600;
    letter-spacing: -0.02em;
    background: linear-gradient(135deg, var(--ink) 0%, var(--blue-700) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .cgreet-subtitle {
    font-size: 15px;
    color: var(--text-secondary);
    margin-top: 6px;
    font-weight: 400;
  }
  .csechead{ display:flex; align-items:center; justify-content:space-between; margin-bottom:16px; }
  .csechead h3{
    font-family:var(--font-display);
    font-size:17px;
    font-weight:600;
    letter-spacing:-0.01em;
    margin:0;
    color: var(--text-primary);
  }
  .cgrid{ display:grid; gap:20px; }
  .cgrid--3{ grid-template-columns:repeat(3,1fr); }
  .cgrid--2{ grid-template-columns:repeat(2,1fr); }

  /* Stats */
  .cstatrow{ display:grid; grid-template-columns:repeat(4,1fr); gap:16px; }
  .cstat{
    display:flex; align-items:center; gap:14px; padding:18px;
    background: linear-gradient(145deg, var(--surface) 0%, var(--gray-25) 100%);
    border:1.5px solid var(--border); border-radius:var(--radius-xl);
    box-shadow:var(--shadow-xs), inset 0 1px 0 rgba(255,255,255,0.8);
    position:relative;
    transition: all 0.3s var(--ease-out);
  }
  .cstat:hover {
    transform: translateY(-3px);
    box-shadow: var(--shadow-md), inset 0 1px 0 rgba(255,255,255,0.9);
    border-color: var(--border-strong);
  }
  .cstat__ic{
    width:44px; height:44px; border-radius:var(--radius-lg);
    display:flex; align-items:center; justify-content:center; flex:none;
    background: linear-gradient(135deg, var(--cat-ads-bg) 0%, #fff 100%);
    box-shadow: var(--shadow-sm);
    transition: all 0.3s ease;
  }
  .cstat:hover .cstat__ic {
    transform: scale(1.1) rotate(5deg);
  }
  .cstat__ic svg{ width:20px; height:20px; }
  .cstat__val{
    font-family:var(--font-display);
    font-size:26px;
    font-weight:700;
    letter-spacing:-0.02em;
    line-height:1;
    color: var(--ink);
  }
  .cstat__lbl{
    font-size:13px;
    color:var(--text-tertiary);
    margin-top:4px;
    font-weight: 500;
  }
  .cstat__delta{
    position:absolute; top:16px; right:16px;
    font-family:var(--font-mono);
    font-size:11px;
    font-weight:600;
    color:var(--success);
    background: var(--success-bg);
    padding: 3px 8px;
    border-radius: var(--radius-pill);
  }

  /* Home teams layout */
  .chome-teams{ display:grid; grid-template-columns:1fr 320px; gap:28px; align-items:start; }
  .cactivity-mini{
    background: linear-gradient(145deg, var(--surface) 0%, var(--gray-25) 100%);
    border:1.5px solid var(--border); border-radius:var(--radius-xl);
    box-shadow:var(--shadow-xs), inset 0 1px 0 rgba(255,255,255,0.8);
    padding:20px;
    transition: all 0.3s var(--ease-out);
  }
  .cactivity-mini:hover {
    box-shadow: var(--shadow-md);
  }
  .crunmini{ display:flex; flex-direction:column; gap:6px; }
  .crunmini__row{
    display:flex; align-items:center; gap:12px; padding:10px 8px;
    border-radius:var(--radius-lg);
    transition: all 0.2s ease;
  }
  .crunmini__row:hover{
    background:var(--surface-hover);
    transform: translateX(4px);
  }

  /* Filter bar */
  .cfilterbar{ display:flex; align-items:center; justify-content:space-between; margin-bottom: 8px; }
  .cfilterbar svg{ width:18px; height:18px; }

  /* Add / build cards */
  .caddcard, .cbuildcard{
    border:2px dashed var(--border-strong); border-radius:var(--radius-xl);
    background: linear-gradient(145deg, transparent 0%, var(--gray-25) 100%);
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    gap:8px; padding:28px; cursor:pointer;
    transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    font-family:var(--font-sans);
    animation: fadeInUp 0.5s ease forwards;
  }
  .caddcard:hover, .cbuildcard:hover{
    border-color:var(--brand);
    background: linear-gradient(145deg, var(--brand-subtle) 0%, var(--blue-50) 100%);
    box-shadow: var(--shadow-md), 0 12px 40px -16px color-mix(in srgb, var(--brand) 30%, transparent);
    transform: translateY(-6px) scale(1.02);
  }
  .caddcard__ic, .cbuildcard__ic{
    width:48px; height:48px; border-radius:var(--radius-lg);
    background: linear-gradient(135deg, var(--gray-100) 0%, #fff 100%);
    color:var(--text-secondary);
    display:flex; align-items:center; justify-content:center; margin-bottom:8px;
    box-shadow: var(--shadow-sm);
    transition: all 0.3s ease;
  }
  .caddcard:hover .caddcard__ic, .cbuildcard:hover .cbuildcard__ic {
    background: linear-gradient(135deg, var(--brand-subtle) 0%, #fff 100%);
    color: var(--brand);
    transform: scale(1.15) rotate(10deg);
    box-shadow: var(--shadow-md);
  }
  .caddcard__ic svg, .cbuildcard__ic svg{ width:22px; height:22px; }
  .cbuildcard{ min-height:220px; }

  /* Run detail */
  .crundetail{ display:grid; grid-template-columns:1fr 320px; gap:28px; align-items:start; }
  .crun-main{
    background: linear-gradient(145deg, var(--surface) 0%, var(--gray-25) 100%);
    border:1.5px solid var(--border); border-radius:var(--radius-xl);
    box-shadow:var(--shadow-xs), inset 0 1px 0 rgba(255,255,255,0.8);
    padding:24px;
    animation: fadeInUp 0.4s ease;
  }
  .crun-head{
    display:flex; align-items:center; justify-content:space-between; gap:14px;
    padding-bottom:20px; border-bottom:1.5px solid var(--border); margin-bottom:12px;
  }
  .crun-mark{
    width:48px; height:48px; border-radius:var(--radius-lg);
    background: linear-gradient(135deg, var(--ink) 0%, var(--blue-900) 100%);
    color:#fff; display:flex; align-items:center; justify-content:center;
    box-shadow: var(--shadow-md), 0 8px 24px -8px rgba(12, 20, 38, 0.4);
  }
  .crun-mark svg{ width:22px; height:22px; }
  .ctimeline{ display:flex; flex-direction:column; }
  .cstep{ display:flex; gap:16px; transition: all 0.2s ease; }
  .cstep:hover { background: var(--surface-hover); border-radius: var(--radius-lg); margin: 0 -12px; padding: 0 12px; }
  .cstep__rail{
    width:20px; flex:none; display:flex; flex-direction:column; align-items:center;
    padding-top:20px; position:relative;
  }
  .cstep__rail::after{
    content:""; position:absolute; top:28px; bottom:-6px; width:2.5px;
    background: linear-gradient(180deg, var(--border) 0%, var(--gray-200) 100%);
    border-radius: 99px;
  }
  .cstep:last-child .cstep__rail::after{ display:none; }
  .cstep__node{
    width:12px; height:12px; border-radius:99px; background:var(--gray-300);
    border:3px solid var(--surface); box-shadow:0 0 0 1.5px var(--border);
    z-index:1; transition: all 0.3s ease;
  }
  .cstep[data-status="success"] .cstep__node{
    background:var(--success);
    box-shadow:0 0 0 1.5px var(--success), 0 0 12px -2px var(--success);
    animation: pulse-dot 2s ease-in-out infinite;
  }
  .cstep[data-status="running"] .cstep__node{
    background:var(--brand);
    box-shadow:0 0 0 1.5px var(--brand), 0 0 16px -2px var(--brand);
    animation: pulse-dot 1.5s ease-in-out infinite;
  }
  @keyframes pulse-dot {
    0%, 100% { transform: scale(1); opacity: 1; }
    50% { transform: scale(1.15); opacity: 0.8; }
  }
  .cstep__card{ flex:1; padding:14px 0; }
  .cstep:not(:last-child) .cstep__card{ border-bottom:1.5px solid var(--gray-100); }

  .crun-side{
    background: linear-gradient(145deg, var(--surface) 0%, var(--gray-25) 100%);
    border:1.5px solid var(--border); border-radius:var(--radius-xl);
    box-shadow:var(--shadow-xs), inset 0 1px 0 rgba(255,255,255,0.8);
    padding:22px;
    animation: fadeInUp 0.5s ease 0.1s both;
  }
  .crun-stats{ display:grid; grid-template-columns:1fr 1fr; gap:16px 14px; }
  .crun-stat__v{
    font-family:var(--font-display);
    font-size:22px;
    font-weight:700;
    letter-spacing:-0.02em;
    color: var(--ink);
  }
  .crun-stat__l{
    font-size:12.5px;
    color:var(--text-tertiary);
    margin-top:4px;
    font-weight: 500;
  }

  .cplaceholder{
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    gap:12px; text-align:center; padding:100px 0;
    animation: fadeInUp 0.4s ease;
  }
  .cplaceholder svg { opacity: 0.5; }

  /* Team workspace - FIXED SCROLL */
  .twspace{ display:flex; height:100%; overflow: hidden; }
  .twchannels{
    width:300px; flex:none; border-right:1.5px solid var(--border);
    display:flex; flex-direction:column; background:var(--surface);
    box-shadow: 4px 0 24px -12px rgba(13,16,20,0.06);
  }
  .twchannels__head{
    display:flex; align-items:center; justify-content:space-between;
    padding:18px 18px 14px;
    font-family:var(--font-display);
    font-weight:600;
    font-size:16px;
    border-bottom: 1px solid var(--border);
  }
  .twchannels__list{
    flex:1; overflow-y:auto; overflow-x: hidden;
    padding:8px 12px 16px;
    display:flex; flex-direction:column; gap:4px;
    scrollbar-width: thin;
    scrollbar-color: var(--gray-300) transparent;
  }
  .twchannels__list::-webkit-scrollbar { width: 5px; }
  .twchannels__list::-webkit-scrollbar-track { background: transparent; }
  .twchannels__list::-webkit-scrollbar-thumb {
    background: var(--gray-300); border-radius: 99px;
  }

  .twchan{
    display:flex; align-items:center; gap:12px; padding:12px;
    border:0; background:transparent; border-radius:var(--radius-lg);
    cursor:pointer; text-align:left; width:100%;
    transition: all 0.2s var(--ease-out);
  }
  .twchan:hover{ background:var(--surface-hover); transform: translateX(4px); }
  .twchan[data-active="1"] {
    background: linear-gradient(145deg, var(--brand-subtle) 0%, var(--blue-50) 100%);
    border: 1.5px solid var(--brand-border);
    box-shadow: var(--shadow-sm);
  }
  .twchan__ic{
    width:40px; height:40px; border-radius:var(--radius-lg); flex:none;
    color:#fff; display:flex; align-items:center; justify-content:center;
    background: linear-gradient(135deg, var(--ink) 0%, var(--blue-800) 100%);
    box-shadow: var(--shadow-sm);
    transition: all 0.3s ease;
  }
  .twchan:hover .twchan__ic { transform: scale(1.08); }
  .twchan__body{ flex:1; min-width:0; }
  .twchan__top{
    display:flex; align-items:baseline; justify-content:space-between; gap:8px;
  }
  .twchan__name{
    font-size:14px;
    font-weight:600;
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
    color: var(--text-primary);
  }
  .twchan__time{
    font-family:var(--font-mono);
    font-size:11px;
    color:var(--text-tertiary);
    flex:none;
    font-weight: 500;
  }
  .twchan__prev{
    font-size:12.5px;
    color:var(--text-tertiary);
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis; margin-top:3px;
    font-weight: 400;
  }
  .twchan__unread{
    flex:none; min-width:20px; height:20px; padding:0 6px;
    border-radius:99px; background:var(--brand); color:#fff;
    font-size:11px; font-weight:700;
    display:flex; align-items:center; justify-content:center;
    box-shadow: 0 2px 8px -2px var(--brand);
    animation: pulse-glow 2s ease-in-out infinite;
  }
  @keyframes pulse-glow {
    0%, 100% { box-shadow: 0 2px 8px -2px var(--brand); }
    50% { box-shadow: 0 4px 16px -4px var(--brand); }
  }

  .twconv{
    flex:1; min-width:0; min-height:0; display:flex; flex-direction:column;
    background: linear-gradient(180deg, var(--gray-50) 0%, var(--surface) 100%);
    overflow: hidden;
  }
  .twconv__head{
    display:flex; align-items:center; gap:14px; padding:16px 24px;
    background: linear-gradient(180deg, var(--surface) 0%, color-mix(in srgb, var(--surface) 98%, transparent) 100%);
    border-bottom:1.5px solid var(--border); flex:none;
    box-shadow: 0 1px 3px rgba(13,16,20,0.03);
  }
  .twconv__mark{
    width:44px; height:44px; border-radius:var(--radius-lg);
    background: linear-gradient(135deg, var(--ink) 0%, var(--blue-900) 100%);
    color:#fff; display:flex; align-items:center; justify-content:center; flex:none;
    box-shadow: var(--shadow-md), 0 8px 24px -8px rgba(12, 20, 38, 0.4);
  }
  .twconv__name{
    font-family:var(--font-display);
    font-size:18px;
    font-weight:600;
    letter-spacing:-0.01em;
    color: var(--text-primary);
  }
  .twconv__sub{
    font-size:13.5px;
    color:var(--text-tertiary);
    margin-top:2px;
    font-weight: 400;
  }
  .twconv__tabs{
    display:flex; gap:8px; padding:10px 24px 0;
    background: var(--surface);
    border-bottom:1.5px solid var(--border); flex:none;
  }
  .twtab{
    display:inline-flex; align-items:center; gap:8px; border:0; background:transparent;
    cursor:pointer; font-family:var(--font-sans);
    font-size:14px; font-weight:500;
    color:var(--text-secondary); padding:10px 8px 14px;
    position:relative;
    transition: all 0.2s ease;
    border-radius: var(--radius-md) var(--radius-md) 0 0;
  }
  .twtab:hover {
    color:var(--text-primary);
    background: var(--surface-hover);
  }
  .twtab[data-active="true"]{
    color:var(--text-primary);
    font-weight:600;
  }
  .twtab[data-active="true"]::after{
    content:""; position:absolute; left:0; right:0; bottom:-1.5px; height:2.5px;
    background: linear-gradient(90deg, var(--brand) 0%, var(--blue-500) 100%);
    border-radius:2px 2px 0 0;
    animation: slideIn 0.3s ease;
  }
  @keyframes slideIn {
    from { transform: scaleX(0); }
    to { transform: scaleX(1); }
  }
  .twtab__c{
    font-family:var(--font-mono);
    font-size:11px;
    color:var(--text-tertiary);
    font-weight:500;
    background: var(--gray-100);
    padding: 2px 8px;
    border-radius: var(--radius-pill);
  }
  .twtab[data-active="true"] .twtab__c {
    background: var(--brand-subtle);
    color: var(--brand);
  }

  /* Chat thread - SINGLE SCROLLBAR FIX */
  .twthread{
    flex:1; min-height:0;
    overflow-y:auto; overflow-x: hidden;
    padding:24px;
    display:flex; flex-direction:column; gap:16px;
    scrollbar-width: thin;
    scrollbar-color: var(--gray-300) transparent;
  }
  .twthread::-webkit-scrollbar { width: 6px; }
  .twthread::-webkit-scrollbar-track { background: transparent; margin: 8px 0; }
  .twthread::-webkit-scrollbar-thumb {
    background: var(--gray-300); border-radius: 99px;
  }
  .twthread::-webkit-scrollbar-thumb:hover { background: var(--gray-400); }

  .twthread__day{
    text-align:center; font-size:11px; font-weight:600;
    color:var(--text-tertiary); text-transform:uppercase;
    letter-spacing:0.1em; margin: 8px 0;
  }

  /* Message bubbles */
  .twmsg{ display:flex; align-items:flex-start; gap:12px; max-width:720px; animation: fadeInUp 0.3s ease; }
  .twmsg--user{ justify-content:flex-end; margin-left:auto; }
  .twbubble{
    background: linear-gradient(145deg, var(--surface) 0%, var(--gray-25) 100%);
    border:1.5px solid var(--border); border-radius:4px 18px 18px 18px;
    padding:14px 18px; font-size:14.5px; line-height:1.6;
    box-shadow:var(--shadow-xs), inset 0 1px 0 rgba(255,255,255,0.8);
    max-width:600px; font-weight: 400;
    transition: all 0.2s ease;
  }
  .twbubble:hover {
    box-shadow: var(--shadow-sm);
    transform: translateY(-1px);
  }
  .twbubble--user{
    background: linear-gradient(135deg, var(--ink) 0%, var(--blue-900) 100%);
    color:#fff; border:0; border-radius:18px 4px 18px 18px;
    box-shadow: var(--shadow-md), 0 8px 24px -8px rgba(12, 20, 38, 0.4);
    font-weight: 500;
  }
  .twbubble--user:hover {
    box-shadow: var(--shadow-lg), 0 12px 32px -12px rgba(12, 20, 38, 0.5);
  }
  .twstep{
    display:flex; align-items:center; gap:14px;
    background: linear-gradient(145deg, var(--surface) 0%, var(--gray-25) 100%);
    border:1.5px solid var(--border); border-left:3px solid var(--border-strong);
    border-radius:var(--radius-lg); padding:14px 18px; margin-left:48px; max-width:560px;
    box-shadow:var(--shadow-xs), inset 0 1px 0 rgba(255,255,255,0.8);
    animation: slideInRight 0.4s ease;
    transition: all 0.2s ease;
  }
  .twstep:hover {
    border-left-color: var(--brand);
    transform: translateX(4px);
    box-shadow: var(--shadow-sm);
  }
  @keyframes slideInRight {
    from { opacity: 0; transform: translateX(20px); }
    to { opacity: 1; transform: translateX(0); }
  }
  .twstep__body{ flex:1; min-width:0; }
  .twstep__name{
    font-size:14px;
    font-weight:600;
    color: var(--text-primary);
  }
  .twstep__msg{
    font-size:13px;
    color:var(--text-secondary);
    margin-top:3px;
    font-weight: 400;
  }

  /* Composer */
  .twcomposer{
    flex:none; padding:18px 24px 22px;
    background: linear-gradient(180deg, var(--surface) 0%, var(--gray-25) 100%);
    border-top:1.5px solid var(--border);
    box-shadow: 0 -4px 20px -8px rgba(13,16,20,0.06);
  }
  .twcomposer__box{
    display:flex; align-items:center; gap:12px;
    border:1.5px solid var(--border-strong); border-radius:var(--radius-xl);
    padding:8px 8px 8px 18px;
    background: var(--surface);
    box-shadow:var(--shadow-sm), inset 0 1px 2px rgba(13,16,20,0.02);
    transition: all 0.25s var(--ease-out);
  }
  .twcomposer__box:focus-within{
    border-color:var(--brand);
    box-shadow:var(--ring), 0 8px 24px -8px color-mix(in srgb, var(--brand) 20%, transparent);
    transform: translateY(-2px);
  }
  .twcomposer__input{
    flex:1; border:0; outline:none; background:transparent;
    font-family:var(--font-sans); font-size:15px;
    color:var(--text-primary); height:40px;
    font-weight: 400;
  }
  .twcomposer__input::placeholder { color: var(--text-disabled); }
  .twcomposer__actions{ display:flex; align-items:center; gap:6px; flex:none; }
  .twcomposer__hint{
    display:flex; align-items:center; gap:8px;
    font-size:12px; color:var(--text-tertiary);
    margin-top:10px; padding-left:4px;
    font-weight: 500;
  }
  .twcomposer__hint svg { color: var(--brand); }

  /* History */
  .twhistory{
    display:flex; flex-direction:column; gap:12px; max-width:720px;
    animation: fadeInUp 0.4s ease;
  }
  .twrun{
    display:flex; align-items:center; gap:14px;
    background: linear-gradient(145deg, var(--surface) 0%, var(--gray-25) 100%);
    border:1.5px solid var(--border); border-radius:var(--radius-xl);
    padding:16px 18px;
    box-shadow:var(--shadow-xs), inset 0 1px 0 rgba(255,255,255,0.8);
    transition: all 0.25s var(--ease-out);
  }
  .twrun:hover {
    transform: translateY(-3px) translateX(4px);
    box-shadow: var(--shadow-md);
    border-color: var(--border-strong);
  }
  .twrun__ic{
    width:32px; height:32px; border-radius:var(--radius-md); flex:none;
    display:flex; align-items:center; justify-content:center;
    background: linear-gradient(135deg, var(--success-bg) 0%, #fff 100%);
    color:var(--success);
    box-shadow: var(--shadow-sm);
    transition: all 0.3s ease;
  }
  .twrun__ic[data-s="paused"]{
    background: linear-gradient(135deg, var(--warning-bg) 0%, #fff 100%);
    color:var(--warning);
  }
  .twrun:hover .twrun__ic { transform: scale(1.15) rotate(8deg); }
  .twrun__ic svg{ width:16px; height:16px; }
  .twrun__name{
    font-size:15px;
    font-weight:600;
    color: var(--text-primary);
  }
  .twrun__stats{
    font-family:var(--font-mono);
    font-size:12px;
    color:var(--text-tertiary);
    margin-top:3px;
    font-weight: 500;
  }
  .twrun__when{
    font-size:13px;
    color:var(--text-tertiary); flex:none;
    font-weight: 500;
  }

  /* Toast */
  .ctoast{
    position:fixed; bottom:28px; left:50%; transform:translateX(-50%);
    display:flex; align-items:center; gap:12px;
    background: linear-gradient(135deg, var(--ink) 0%, var(--blue-900) 100%);
    color:#fff; padding:14px 20px; border-radius:var(--radius-xl);
    box-shadow: var(--shadow-xl), 0 16px 48px -16px rgba(12, 20, 38, 0.5);
    font-size:14px; font-weight:500; z-index:50;
    animation:ctoast-in 0.5s var(--ease-spring);
    border: 1px solid rgba(255,255,255,0.1);
  }
  .ctoast__ic{
    display:flex; width:22px; height:22px; align-items:center; justify-content:center;
    background:var(--brand); border-radius:99px;
    box-shadow: 0 4px 12px -4px var(--brand);
  }
  .ctoast__ic svg{ width:14px; height:14px; }
  @keyframes ctoast-in{
    from{ opacity:0; transform:translate(-50%,20px) scale(0.9); }
    to{ opacity:1; transform:translate(-50%,0) scale(1); }
  }

  /* Responsive */
  @media (max-width:1080px){
    .cstatrow{ grid-template-columns:repeat(2,1fr); }
    .cgrid--3{ grid-template-columns:repeat(2,1fr); }
    .chome-teams,.crundetail{ grid-template-columns:1fr; }
    .twchannels { width: 260px; }
  }
  @media (max-width:768px){
    .csidebar { display: none; }
    .cview { padding: 20px; }
    .twchannels { width: 100%; }
  }
</style>
</head>
