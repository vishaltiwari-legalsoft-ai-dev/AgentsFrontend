<!-- @dsCard group="Marketing" viewport="1280x880" name="Marketing — landing page" subtitle="Hero, agents vs teams, specialist grid, how-it-works, CTA" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Ensemble — Hire AI specialists. Or deploy a team.</title>
<link rel="stylesheet" href="../../styles.css"/>
<style>
  *{ box-sizing:border-box; }
  html,body{ margin:0; }
  body{ font-family:var(--font-sans); color:var(--text-primary); background:var(--surface); -webkit-font-smoothing:antialiased; }
  a{ color:inherit; text-decoration:none; }
  .mpage{ }
  .luc{ }

  /* Nav */
  .mnav{ position:sticky; top:0; z-index:20; background:color-mix(in srgb, var(--surface) 82%, transparent); backdrop-filter:blur(10px); border-bottom:1px solid var(--border); }
  .mnav__in{ max-width:1140px; margin:0 auto; height:64px; display:flex; align-items:center; gap:28px; padding:0 28px; }
  .mnav__logo{ display:flex; align-items:center; gap:9px; font-family:var(--font-display); font-weight:700; font-size:18px; letter-spacing:-0.02em; }
  .mnav__links{ display:flex; gap:24px; margin-left:8px; }
  .mnav__links a{ font-size:14px; font-weight:500; color:var(--text-secondary); transition:color var(--dur-fast); white-space:nowrap; }
  .mnav__links a:hover{ color:var(--text-primary); }
  .mnav__cta{ margin-left:auto; display:flex; align-items:center; gap:8px; }

  /* Hero */
  .mhero{ max-width:1140px; margin:0 auto; padding:72px 28px 56px; display:grid; grid-template-columns:1.05fr 0.95fr; gap:52px; align-items:center;
    background:radial-gradient(120% 80% at 80% 0%, var(--brand-subtle), transparent 60%); }
  .mbadge{ display:inline-flex; align-items:center; gap:7px; font-size:12.5px; font-weight:600; color:var(--text-secondary);
    background:var(--surface); border:1px solid var(--border); border-radius:var(--radius-pill); padding:5px 12px; box-shadow:var(--shadow-xs); }
  .mbadge__dot{ width:7px; height:7px; border-radius:99px; background:var(--brand); }
  .mhero h1{ font-family:var(--font-display); font-size:54px; line-height:1.04; letter-spacing:-0.03em; font-weight:700; margin:18px 0 0; }
  .mhero h1 em{ font-style:normal; color:var(--brand); }
  .mhero__copy > p{ font-size:18px; line-height:1.6; color:var(--text-secondary); margin:18px 0 0; max-width:480px; }
  .mhero__actions{ display:flex; gap:12px; margin-top:28px; }
  .mhero__trust{ display:flex; align-items:center; gap:12px; margin-top:28px; font-size:13px; color:var(--text-tertiary); }
  .mhero__art{ position:relative; }
  .mhero__art > .ens-teamcard{ box-shadow:var(--shadow-xl); }
  .mhero__floats{ display:flex; flex-direction:column; gap:14px; position:absolute; right:-18px; bottom:-44px; width:300px; }
  .mhero__floats .ens-agentcard{ box-shadow:var(--shadow-lg); }
  .mhero__floats .ens-agentcard:nth-child(2){ margin-left:-46px; }

  /* Logos */
  .mlogos{ max-width:1140px; margin:0 auto; padding:56px 28px 8px; text-align:center; }
  .mlogos > span{ font-size:12px; font-weight:600; letter-spacing:0.08em; text-transform:uppercase; color:var(--text-tertiary); }
  .mlogos__row{ display:flex; justify-content:center; flex-wrap:wrap; gap:40px; margin-top:18px; }
  .mlogo{ font-family:var(--font-display); font-size:22px; font-weight:700; letter-spacing:-0.02em; color:var(--gray-400); }

  /* Split */
  .msplit{ max-width:1140px; margin:0 auto; padding:72px 28px; display:grid; grid-template-columns:1fr 1fr; gap:30px; }
  .msplit__col{ background:var(--surface); border:1px solid var(--border); border-radius:var(--radius-2xl); padding:38px; box-shadow:var(--shadow-xs); }
  .meyebrow{ display:inline-flex; align-items:center; gap:7px; font-size:13px; font-weight:700; letter-spacing:0.02em; }
  .msplit h2{ font-family:var(--font-display); font-size:30px; line-height:1.1; letter-spacing:-0.02em; font-weight:600; margin:14px 0 0; }
  .msplit p{ font-size:15.5px; line-height:1.6; color:var(--text-secondary); margin:14px 0 0; }
  .mlist{ list-style:none; padding:0; margin:22px 0 0; display:flex; flex-direction:column; gap:11px; }
  .mlist li{ display:flex; align-items:center; gap:10px; font-size:14.5px; font-weight:500; }
  .mlist li .luc{ color:var(--success); }

  /* Section */
  .msection{ max-width:1140px; margin:0 auto; padding:40px 28px; }
  .msection__head{ text-align:center; margin-bottom:34px; }
  .msection__head h2{ font-family:var(--font-display); font-size:34px; letter-spacing:-0.025em; font-weight:700; margin:0; }
  .msection__head p{ font-size:16px; color:var(--text-secondary); margin:10px 0 0; }
  .magrid{ display:grid; grid-template-columns:repeat(3,1fr); gap:18px; }

  /* How */
  .mhow{ background:var(--gray-50); border-top:1px solid var(--border); border-bottom:1px solid var(--border); padding:64px 28px; margin-top:24px; }
  .mhow .msection__head{ margin-bottom:40px; }
  .mhow__row{ max-width:1000px; margin:0 auto; display:grid; grid-template-columns:repeat(3,1fr); gap:24px; }
  .mstep{ background:var(--surface); border:1px solid var(--border); border-radius:var(--radius-xl); padding:26px; position:relative; box-shadow:var(--shadow-xs); }
  .mstep__n{ position:absolute; top:20px; right:22px; font-family:var(--font-mono); font-size:12px; color:var(--text-tertiary); }
  .mstep__ic{ display:inline-flex; width:46px; height:46px; border-radius:var(--radius-lg); background:var(--brand-subtle); color:var(--brand); align-items:center; justify-content:center; }
  .mstep h3{ font-family:var(--font-display); font-size:18px; font-weight:600; margin:16px 0 0; }
  .mstep p{ font-size:14px; color:var(--text-secondary); line-height:1.55; margin:6px 0 0; }

  /* CTA */
  .mcta{ max-width:900px; margin:0 auto; padding:86px 28px; text-align:center; }
  .mcta h2{ font-family:var(--font-display); font-size:42px; letter-spacing:-0.03em; font-weight:700; margin:0; }
  .mcta p{ font-size:18px; color:var(--text-secondary); margin:14px 0 0; }
  .mcta__actions{ display:flex; gap:12px; justify-content:center; margin-top:30px; }

  /* Footer */
  .mfooter{ border-top:1px solid var(--border); background:var(--gray-50); }
  .mfooter__in{ max-width:1140px; margin:0 auto; padding:28px; display:flex; align-items:center; justify-content:space-between; gap:16px; }
  .mfooter__brand{ display:flex; align-items:center; gap:9px; font-family:var(--font-display); font-weight:700; font-size:16px; }
  .mfooter__copy{ font-size:13px; color:var(--text-tertiary); }

  @media (max-width:900px){
    .mhero{ grid-template-columns:1fr; } .mhero__art{ display:none; }
    .msplit, .magrid, .mhow__row{ grid-template-columns:1fr; }
    .mnav__links{ display:none; } .mhero h1{ font-size:40px; }
  }
</style>
</head>
<body>
  <div id="root"></div>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/lucide@0.460.0/dist/umd/lucide.min.js"></script>
  <script type="text/babel" src="../_shared/kit-ui.jsx"></script>
  <script type="text/babel" src="../console/data.jsx"></script>
  <script type="text/babel" src="sections.jsx"></script>
  <script type="text/babel">
    const L = window.MarketingLanding;
    ReactDOM.createRoot(document.getElementById('root')).render(<L/>);
  </script>
</body>
</html>
