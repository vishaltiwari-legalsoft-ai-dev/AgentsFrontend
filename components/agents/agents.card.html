<!-- @dsCard group="Components" viewport="700x300" name="Agents & Teams" subtitle="AgentCard and TeamCard — the brand's signature components" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<link rel="stylesheet" href="../../styles.css"/>
<style>
  html,body{ margin:0; }
  body{
    background: linear-gradient(135deg, var(--gray-50) 0%, var(--cream-50) 100%);
    font-family:var(--font-sans);
    color:var(--text-primary);
    padding:28px 32px;
  }
  .grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:24px;
    align-items:start;
    max-width: 900px;
    margin: 0 auto;
  }
  .lucide{ width:24px; height:24px; }

  /* Animation for cards */
  @keyframes fadeInUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .card-wrapper {
    opacity: 0;
    animation: fadeInUp 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
  }
  .card-wrapper:nth-child(1) { animation-delay: 0.1s; }
  .card-wrapper:nth-child(2) { animation-delay: 0.2s; }
</style>
</head>
<body>
  <div id="root"></div>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/lucide@0.460.0/dist/umd/lucide.min.js"></script>
  <script src="../../_ds_bundle.js"></script>
  <script type="text/babel">
    const { AgentCard, TeamCard } = window.EnsembleDesignSystem_c3f858;
    const I = (n) => <i data-lucide={n} className="lucide"></i>;
    function Demo(){
      return (
        <div className="grid">
          <div className="card-wrapper">
            <AgentCard
              name="Graphic Designer" role="Brand & visual assets"
              description="Creates on-brand graphics, social creatives, and ad variants from a prompt."
              category="design" glyph={I('palette')} status="success" onAdd={()=>{}} interactive
            />
          </div>
          <div className="card-wrapper">
            <TeamCard
              name="Campaign Manager"
              description="Plans, drafts, and schedules a full marketing campaign across channels."
              members={[{name:'Graphic Designer',category:'design'},{name:'Copywriter',category:'copy'},{name:'Social Scheduler',category:'social'},{name:'Ads Optimizer',category:'ads'},{name:'SEO Analyst',category:'seo'}]}
              status="running" lastRun="2h ago" onDeploy={()=>{}} interactive
            />
          </div>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<Demo/>);
    requestAnimationFrame(() => window.lucide && window.lucide.createIcons());
  </script>
</body>
</html>
