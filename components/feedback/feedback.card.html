<!-- @dsCard group="Components" viewport="700x200" name="Feedback" subtitle="Badge, Tag (category-coded) & StatusDot" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<link rel="stylesheet" href="../../styles.css"/>
<style>
  html,body{ margin:0; }
  body{ background:var(--surface); font-family:var(--font-sans); color:var(--text-primary); padding:22px 24px; display:flex; flex-direction:column; gap:18px; }
  .row{ display:flex; align-items:center; gap:10px; flex-wrap:wrap; }
  .lbl{ font-size:10.5px; font-weight:700; letter-spacing:0.08em; text-transform:uppercase; color:var(--text-tertiary); width:70px; flex:none; }
  .lucide{ width:13px; height:13px; }
</style>
</head>
<body>
  <div id="root"></div>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/lucide@0.460.0/dist/umd/lucide.min.js"></script>
  <script src="../../_ds_bundle.js"></script>
  <script type="text/babel">
    const { Badge, Tag, StatusDot } = window.EnsembleDesignSystem_c3f858;
    const I = (n) => <i data-lucide={n} className="lucide"></i>;
    function Demo(){
      return (
        <div style={{display:'flex',flexDirection:'column',gap:18}}>
          <div className="row"><span className="lbl">Badge</span>
            <Badge variant="brand">New</Badge>
            <Badge variant="success" dot>Live</Badge>
            <Badge variant="warning" dot>Review</Badge>
            <Badge variant="danger" dot>Failed</Badge>
            <Badge variant="neutral">v2.4</Badge>
            <Badge variant="outline">Draft</Badge>
          </div>
          <div className="row"><span className="lbl">Tag</span>
            <Tag category="design" glyph={I('palette')}>Design</Tag>
            <Tag category="seo" glyph={I('search')}>SEO</Tag>
            <Tag category="copy" glyph={I('pen-line')}>Copy</Tag>
            <Tag category="social" glyph={I('megaphone')}>Social</Tag>
            <Tag category="ads" onRemove={()=>{}}>Paid ads</Tag>
          </div>
          <div className="row"><span className="lbl">Status</span>
            <StatusDot status="running"/>
            <StatusDot status="success"/>
            <StatusDot status="paused"/>
            <StatusDot status="error"/>
            <StatusDot status="idle"/>
          </div>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<Demo/>);
    requestAnimationFrame(() => window.lucide && window.lucide.createIcons());
  </script>
</body>
</html>
