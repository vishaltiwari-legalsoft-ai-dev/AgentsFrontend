<!-- @dsCard group="Components" viewport="700x230" name="Buttons" subtitle="Button & IconButton — variants, sizes, states" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<link rel="stylesheet" href="../../styles.css"/>
<style>
  html,body{ margin:0; }
  body{ background:var(--surface); font-family:var(--font-sans); color:var(--text-primary);
        padding:22px 24px; display:flex; flex-direction:column; gap:18px; }
  .row{ display:flex; align-items:center; gap:12px; flex-wrap:wrap; }
  .lbl{ font:var(--text-label); color:var(--text-tertiary); width:74px; flex:none;
        text-transform:uppercase; font-size:10.5px; letter-spacing:0.08em; }
  .grp{ display:flex; align-items:center; gap:12px; flex-wrap:wrap; }
  .lucide{ width:1em; height:1em; }
</style>
</head>
<body>
  <div id="root"></div>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/lucide@0.460.0/dist/umd/lucide.min.js"></script>
  <script src="../../_ds_bundle.js"></script>
  <script type="text/babel">
    const { Button, IconButton } = window.EnsembleDesignSystem_c3f858;
    const I = (n) => <i data-lucide={n} className="lucide"></i>;
    function Demo(){
      return (
        <div style={{display:'flex',flexDirection:'column',gap:18}}>
          <div className="row"><span className="lbl">Variants</span><div className="grp">
            <Button variant="gradient">Deploy team</Button>
            <Button variant="primary" iconLeft={I('plus')}>New agent</Button>
            <Button variant="accent">Upgrade</Button>
            <Button variant="secondary">Cancel</Button>
            <Button variant="ghost">Skip</Button>
            <Button variant="danger" iconLeft={I('trash-2')}>Delete</Button>
          </div></div>
          <div className="row"><span className="lbl">Sizes</span><div className="grp">
            <Button size="sm" variant="secondary">Small</Button>
            <Button size="md" variant="secondary">Medium</Button>
            <Button size="lg" variant="secondary">Large</Button>
            <Button variant="gradient" iconRight={I('arrow-right')}>Continue</Button>
            <Button variant="primary" disabled>Disabled</Button>
          </div></div>
          <div className="row"><span className="lbl">Icon</span><div className="grp">
            <IconButton label="Settings" variant="solid">{I('settings')}</IconButton>
            <IconButton label="Run" variant="brand">{I('play')}</IconButton>
            <IconButton label="More">{I('ellipsis')}</IconButton>
            <IconButton label="Star">{I('star')}</IconButton>
          </div></div>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<Demo/>);
    requestAnimationFrame(() => window.lucide && window.lucide.createIcons());
  </script>
</body>
</html>
