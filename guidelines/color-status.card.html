<!-- @dsCard group="Colors" viewport="700x150" name="Status colors" subtitle="Muted semantic colors for success, warning, and danger" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<link rel="stylesheet" href="../styles.css"/>
<style>
  html,body{ margin:0; }
  body{ background:var(--surface); font-family:var(--font-sans); color:var(--text-primary); padding:20px 22px; }
  .row{ display:flex; gap:14px; }
  .item{ flex:1; display:flex; align-items:center; gap:11px; padding:12px 14px; border:1px solid var(--border); border-radius:var(--radius-md); }
  .dot{ width:30px; height:30px; border-radius:var(--radius-sm); flex:none; }
  .name{ font-size:13px; font-weight:600; }
  .hex{ font-family:var(--font-mono); font-size:11px; color:var(--text-tertiary); margin-top:1px; }
</style>
</head>
<body>
  <div class="row">
    <div class="item" style="background:var(--success-bg)"><div class="dot" style="background:var(--success)"></div><div><div class="name">Success</div><div class="hex">--success #12A150</div></div></div>
    <div class="item" style="background:var(--warning-bg)"><div class="dot" style="background:var(--warning)"></div><div><div class="name">Warning</div><div class="hex">--warning #D98A00</div></div></div>
    <div class="item" style="background:var(--danger-bg)"><div class="dot" style="background:var(--danger)"></div><div><div class="name">Danger</div><div class="hex">--danger #E5484D</div></div></div>
  </div>
</body>
</html>
