<!-- @dsCard group="Spacing" viewport="700x180" name="Spacing scale" subtitle="4px base, used generously — airy by default" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<link rel="stylesheet" href="../styles.css"/>
<style>
  html,body{ margin:0; }
  body{ background:var(--surface); font-family:var(--font-sans); color:var(--text-primary); padding:18px 22px; }
  .row{ display:flex; align-items:flex-end; gap:10px; flex-wrap:wrap; }
  .item{ text-align:center; }
  .bar{ background:var(--brand); border-radius:var(--radius-xs); width:18px; }
  .n{ font-family:var(--font-mono); font-size:10px; color:var(--text-tertiary); margin-top:6px; }
</style>
</head>
<body>
  <div class="row">
    <div class="item"><div class="bar" style="height:4px"></div><div class="n">1·4</div></div>
    <div class="item"><div class="bar" style="height:8px"></div><div class="n">2·8</div></div>
    <div class="item"><div class="bar" style="height:12px"></div><div class="n">3·12</div></div>
    <div class="item"><div class="bar" style="height:16px"></div><div class="n">4·16</div></div>
    <div class="item"><div class="bar" style="height:20px"></div><div class="n">5·20</div></div>
    <div class="item"><div class="bar" style="height:24px"></div><div class="n">6·24</div></div>
    <div class="item"><div class="bar" style="height:32px"></div><div class="n">7·32</div></div>
    <div class="item"><div class="bar" style="height:40px"></div><div class="n">8·40</div></div>
    <div class="item"><div class="bar" style="height:48px"></div><div class="n">9·48</div></div>
    <div class="item"><div class="bar" style="height:64px"></div><div class="n">10·64</div></div>
    <div class="item"><div class="bar" style="height:80px"></div><div class="n">11·80</div></div>
  </div>
</body>
</html>
