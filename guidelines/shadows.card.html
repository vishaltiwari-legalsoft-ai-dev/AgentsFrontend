<!-- @dsCard group="Spacing" viewport="700x180" name="Elevation / shadows" subtitle="Soft, low-opacity layers; elevation = border + faint diffuse shadow" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<link rel="stylesheet" href="../styles.css"/>
<style>
  html,body{ margin:0; }
  body{ background:var(--gray-50); font-family:var(--font-sans); color:var(--text-primary); padding:26px 22px; }
  .row{ display:flex; gap:22px; }
  .item{ text-align:center; }
  .box{ width:84px; height:60px; background:var(--surface); border:1px solid var(--border); border-radius:var(--radius-lg); }
  .n{ font-size:12px; font-weight:600; margin-top:11px; }
  .v{ font-family:var(--font-mono); font-size:10px; color:var(--text-tertiary); }
</style>
</head>
<body>
  <div class="row">
    <div class="item"><div class="box" style="box-shadow:var(--shadow-xs)"></div><div class="n">xs</div><div class="v">--shadow-xs</div></div>
    <div class="item"><div class="box" style="box-shadow:var(--shadow-sm)"></div><div class="n">sm</div><div class="v">--shadow-sm</div></div>
    <div class="item"><div class="box" style="box-shadow:var(--shadow-md)"></div><div class="n">md</div><div class="v">--shadow-md</div></div>
    <div class="item"><div class="box" style="box-shadow:var(--shadow-lg)"></div><div class="n">lg</div><div class="v">--shadow-lg</div></div>
    <div class="item"><div class="box" style="box-shadow:var(--shadow-xl)"></div><div class="n">xl</div><div class="v">--shadow-xl</div></div>
  </div>
</body>
</html>
