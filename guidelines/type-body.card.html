<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<link rel="stylesheet" href="../styles.css"/>
<style>
  html,body{ margin:0; }
  body{ background:var(--surface); font-family:var(--font-sans); color:var(--text-primary); padding:18px 22px; }
  .lead{ font-size:17px; line-height:1.55; max-width:560px; }
  .p{ font-size:15px; line-height:1.55; color:var(--text-secondary); max-width:560px; margin-top:8px; }
  .meta{ font-family:var(--font-mono); font-size:11px; color:var(--text-tertiary); margin-top:12px; }
  b{ font-weight:600; color:var(--text-primary); }
</style>
</head>
<body>
  <div class="lead">Your <b>Campaign Manager</b> just drafted 12 posts and queued them for review.</div>
  <div class="p">Pick a specialist agent for a single task, or deploy a whole team that coordinates the work and reports back here. Everything runs out of the box.</div>
  <div class="meta">Manrope (Causten substitute) · 400 / 500 / 600 / 700 / 800 · --font-sans</div>
</body>
</html>
