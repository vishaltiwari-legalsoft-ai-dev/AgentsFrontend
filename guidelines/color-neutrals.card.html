<!-- @dsCard group="Colors" viewport="700x150" name="Neutral scale" subtitle="Slightly-cool gray ramp — canvas, surfaces, borders, and text" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<link rel="stylesheet" href="../styles.css"/>
<style>
  html,body{ margin:0; }
  body{ background:var(--surface); font-family:var(--font-sans); color:var(--text-primary); padding:20px 22px; }
  .ramp{ display:flex; gap:6px; }
  .sw{ flex:1; text-align:center; }
  .chip{ height:56px; border-radius:var(--radius-sm); border:1px solid rgba(13,16,20,.07); }
  .n{ font-family:var(--font-mono); font-size:10px; color:var(--text-tertiary); margin-top:7px; }
</style>
</head>
<body>
  <div class="ramp">
    <div class="sw"><div class="chip" style="background:var(--gray-0)"></div><div class="n">0</div></div>
    <div class="sw"><div class="chip" style="background:var(--gray-50)"></div><div class="n">50</div></div>
    <div class="sw"><div class="chip" style="background:var(--gray-100)"></div><div class="n">100</div></div>
    <div class="sw"><div class="chip" style="background:var(--gray-150)"></div><div class="n">150</div></div>
    <div class="sw"><div class="chip" style="background:var(--gray-200)"></div><div class="n">200</div></div>
    <div class="sw"><div class="chip" style="background:var(--gray-300)"></div><div class="n">300</div></div>
    <div class="sw"><div class="chip" style="background:var(--gray-400)"></div><div class="n">400</div></div>
    <div class="sw"><div class="chip" style="background:var(--gray-500)"></div><div class="n">500</div></div>
    <div class="sw"><div class="chip" style="background:var(--gray-600)"></div><div class="n">600</div></div>
    <div class="sw"><div class="chip" style="background:var(--gray-700)"></div><div class="n">700</div></div>
    <div class="sw"><div class="chip" style="background:var(--gray-800)"></div><div class="n">800</div></div>
    <div class="sw"><div class="chip" style="background:var(--gray-900)"></div><div class="n">900</div></div>
  </div>
</body>
</html>
