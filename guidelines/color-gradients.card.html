<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<link rel="stylesheet" href="../styles.css"/>
<style>
  html,body{ margin:0; }
  body{ background:var(--surface); font-family:var(--font-sans); color:var(--text-primary); padding:20px 22px; }
  .row{ display:flex; gap:14px; }
  .g{ flex:1; }
  .chip{ height:72px; border-radius:var(--radius-md); border:1px solid rgba(12,20,38,.06); }
  .name{ font-size:12px; font-weight:700; margin-top:9px; }
  .hex{ font-family:var(--font-mono); font-size:10px; color:var(--text-tertiary); margin-top:1px; }
</style>
</head>
<body>
  <div class="row">
    <div class="g"><div class="chip" style="background:var(--grad-brand)"></div><div class="name">Brand</div><div class="hex">5F9DF7 → 1746A2</div></div>
    <div class="g"><div class="chip" style="background:var(--grad-brand-soft)"></div><div class="name">Brand soft</div><div class="hex">5F9DF7 → F7F9FF</div></div>
    <div class="g"><div class="chip" style="background:var(--grad-duo)"></div><div class="name">Duo</div><div class="hex">1746A2 → FF731D</div></div>
    <div class="g"><div class="chip" style="background:var(--grad-warm)"></div><div class="name">Warm</div><div class="hex">F7F9FF → FF731D</div></div>
  </div>
</body>
</html>
