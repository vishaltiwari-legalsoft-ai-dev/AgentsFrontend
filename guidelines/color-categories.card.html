<!-- @dsCard group="Colors" viewport="700x180" name="Agent category palette" subtitle="Soft tinted chips that tag each agent specialism — where 'playful' lives" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<link rel="stylesheet" href="../styles.css"/>
<script src="https://unpkg.com/lucide@0.460.0/dist/umd/lucide.min.js"></script>
<style>
  html,body{ margin:0; }
  body{ background:var(--surface); font-family:var(--font-sans); color:var(--text-primary); padding:20px 22px; }
  .grid{ display:grid; grid-template-columns:repeat(6,1fr); gap:12px; }
  .cat{ text-align:center; }
  .tile{ height:54px; border-radius:var(--radius-md); display:flex; align-items:center; justify-content:center; }
  .tile svg{ width:22px; height:22px; }
  .name{ font-size:12px; font-weight:600; margin-top:8px; }
  .v{ font-family:var(--font-mono); font-size:10px; color:var(--text-tertiary); margin-top:1px; }
</style>
</head>
<body>
  <div class="grid">
    <div class="cat"><div class="tile" style="background:var(--cat-design-bg);color:var(--cat-design)"><i data-lucide="palette"></i></div><div class="name">Design</div><div class="v">--cat-design</div></div>
    <div class="cat"><div class="tile" style="background:var(--cat-seo-bg);color:var(--cat-seo)"><i data-lucide="search"></i></div><div class="name">SEO</div><div class="v">--cat-seo</div></div>
    <div class="cat"><div class="tile" style="background:var(--cat-copy-bg);color:var(--cat-copy)"><i data-lucide="pen-line"></i></div><div class="name">Copy</div><div class="v">--cat-copy</div></div>
    <div class="cat"><div class="tile" style="background:var(--cat-social-bg);color:var(--cat-social)"><i data-lucide="megaphone"></i></div><div class="name">Social</div><div class="v">--cat-social</div></div>
    <div class="cat"><div class="tile" style="background:var(--cat-ads-bg);color:var(--cat-ads)"><i data-lucide="target"></i></div><div class="name">Ads</div><div class="v">--cat-ads</div></div>
    <div class="cat"><div class="tile" style="background:var(--cat-data-bg);color:var(--cat-data)"><i data-lucide="bar-chart-3"></i></div><div class="name">Data</div><div class="v">--cat-data</div></div>
  </div>
  <script>lucide.createIcons();</script>
</body>
</html>
