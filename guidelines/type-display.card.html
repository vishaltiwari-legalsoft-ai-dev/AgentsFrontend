<!-- @dsCard group="Type" viewport="700x190" name="Display — Space Grotesk" subtitle="Geometric grotesque for headings; tight negative tracking at large sizes" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<link rel="stylesheet" href="../styles.css"/>
<style>
  html,body{ margin:0; }
  body{ background:var(--surface); font-family:var(--font-display); color:var(--text-primary); padding:18px 22px; }
  .xl{ font-size:46px; font-weight:700; letter-spacing:-0.025em; line-height:1.04; }
  .lg{ font-size:30px; font-weight:600; letter-spacing:-0.02em; line-height:1.1; margin-top:8px; }
  .meta{ font-family:var(--font-mono); font-size:11px; color:var(--text-tertiary); margin-top:12px; }
</style>
</head>
<body>
  <div class="xl">Deploy a team.</div>
  <div class="lg">Specialist agents, working together</div>
  <div class="meta">Manrope (Causten substitute) · 400 / 500 / 600 / 700 / 800 · --font-display</div>
</body>
</html>
