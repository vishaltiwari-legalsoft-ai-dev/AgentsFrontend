<!-- @dsCard group="Spacing" viewport="700x150" name="Radii" subtitle="Sharp & minimal — 2px controls up to pill for tags only" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<link rel="stylesheet" href="../styles.css"/>
<style>
  html,body{ margin:0; }
  body{ background:var(--surface); font-family:var(--font-sans); color:var(--text-primary); padding:20px 22px; }
  .row{ display:flex; gap:20px; }
  .item{ text-align:center; }
  .box{ width:64px; height:52px; background:var(--gray-100); border:1px solid var(--border-strong); }
  .n{ font-size:12px; font-weight:600; margin-top:9px; }
  .v{ font-family:var(--font-mono); font-size:10px; color:var(--text-tertiary); }
</style>
</head>
<body>
  <div class="row">
    <div class="item"><div class="box" style="border-radius:var(--radius-xs)"></div><div class="n">xs</div><div class="v">2px</div></div>
    <div class="item"><div class="box" style="border-radius:var(--radius-sm)"></div><div class="n">sm</div><div class="v">3px</div></div>
    <div class="item"><div class="box" style="border-radius:var(--radius-md)"></div><div class="n">md</div><div class="v">5px</div></div>
    <div class="item"><div class="box" style="border-radius:var(--radius-lg)"></div><div class="n">lg</div><div class="v">8px</div></div>
    <div class="item"><div class="box" style="border-radius:var(--radius-xl)"></div><div class="n">xl</div><div class="v">12px</div></div>
    <div class="item"><div class="box" style="border-radius:var(--radius-2xl)"></div><div class="n">2xl</div><div class="v">16px</div></div>
    <div class="item"><div class="box" style="border-radius:var(--radius-pill)"></div><div class="n">pill</div><div class="v">999</div></div>
  </div>
</body>
</html>
