<!-- @dsCard group="Colors" viewport="700x160" name="Brand & accent" subtitle="Blue identity (#5F9DF7 → #1746A2) and orange accent (#FF731D)" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<link rel="stylesheet" href="../styles.css"/>
<style>
  html,body{ margin:0; }
  body{ background:var(--surface); font-family:var(--font-sans); color:var(--text-primary); padding:20px 22px; }
  .swatches{ display:flex; gap:14px; }
  .sw{ flex:1; }
  .chip{ height:64px; border-radius:var(--radius-md); border:1px solid rgba(12,20,38,.08); }
  .name{ font-size:12.5px; font-weight:700; margin-top:9px; }
  .hex{ font-family:var(--font-mono); font-size:11px; color:var(--text-tertiary); margin-top:1px; }
</style>
</head>
<body>
  <div class="swatches">
    <div class="sw"><div class="chip" style="background:var(--blue-300)"></div><div class="name">Main light</div><div class="hex">#5F9DF7 · --brand-light</div></div>
    <div class="sw"><div class="chip" style="background:var(--blue-700)"></div><div class="name">Main dark</div><div class="hex">#1746A2 · --brand</div></div>
    <div class="sw"><div class="chip" style="background:var(--blue-900)"></div><div class="name">Ink</div><div class="hex">#0B2350 · --text-primary</div></div>
    <div class="sw"><div class="chip" style="background:var(--accent)"></div><div class="name">Accent</div><div class="hex">#FF731D · --accent</div></div>
    <div class="sw"><div class="chip" style="background:var(--cream-100);border-color:var(--border)"></div><div class="name">Warm neutral</div><div class="hex">#FFF7E9 · --surface-warm</div></div>
  </div>
</body>
</html>
